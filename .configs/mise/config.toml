"aqua:pnpm/pnpm" = "latest"
"aqua:rust-lang/rust-analyzer" = "latest"
"aqua:skaji/relocatable-perl" = "latest"
"aqua:tamasfe/taplo" = "latest"
"github:coursier/coursier" = "latest"
"github:skim-rs/skim" = "latest"

# "asdf:mise-plugins/mise-sbt" = "1.12.13"
"conda:sbt" = "latest"
"vfox:mise-plugins/vfox-scala" = "latest"

# Simple
age = "latest"
bun = "latest"
fnox = "latest"
go = "1.26"
lua = "5.1"
node = "26"
python = "3.14"
sops = "latest"
